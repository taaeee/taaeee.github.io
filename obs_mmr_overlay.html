<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>L4D2 MMR Badge for OBS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent; /* transparent for OBS */
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      font-family: 'Arial', sans-serif;
    }
    .mmr-badge {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 24px;
      width: 140px;
      height: 44px;
      background: linear-gradient(to right, #3f4c6b 0%, #d5447a 50%, #ea4b7c 50%, #ff5588 100%);
      clip-path: polygon(0 15%, 50% 0, 100% 15%, 100% 85%, 50% 100%, 0 85%);
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
      opacity: 0;
      transition: opacity 0.5s;
    }
    .mmr-text {
      position: relative;
      z-index: 10;
      letter-spacing: 2px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="mmr-badge" id="mmrBadge">
    <span class="mmr-text" id="mmrText">---</span>
  </div>

  <script>
    // Configuración de Supabase
    const supabaseUrl = 'https://vctxtgacwuprmivvgclw.supabase.co';
    const supabaseKey = 'sb_publishable_x6a3UfdTi8NpEyqFqhL31A_ZS5RCjfg';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Obtener token de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const badge = document.getElementById('mmrBadge');
    const text = document.getElementById('mmrText');

    if (token) {
      console.log("Conectando al canal obs_" + token);
      const channel = supabaseClient.channel(`obs_${token}`);
      channel.on('broadcast', { event: 'mmr_update' }, payload => {
        console.log("Recibido evento mmr_update:", payload);
        if (payload.payload && payload.payload.mmr) {
          text.textContent = payload.payload.mmr;
          badge.style.opacity = '1';
        }
      }).subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log("Conectado! Esperando MMR...");
        }
      });
    } else {
      console.error("No se encontró el token en la URL. Asegúrate de añadir ?token=TU_TOKEN al final de la URL en OBS.");
    }
  </script>
</body>
</html>
